[global]
ckptRange = 1.0

[checkpoints]
checkpoint = 1.0,0.0

[route1]
endCkpt = 1
mode = TcpRemote

; 头部角度
headPitch = 0.70

; 预设速度
forwardLinearVelocity = 0.50
backwardLinearVelocity = 0.30
turnAngularVelocity = 0.80

; 安全上限
maxLinearVelocity = 1.00
maxAngularVelocity = 1.10

; 速度平滑步长
linearRampStep = 0.10
angularRampStep = 0.14

; 手机超过这个时间不发命令，Loom 自动停车（毫秒）
commandTimeoutMs = 700

[voice]
startLinearVelocity = 0.3
linearVelocityStep = 0.1
linearVelocityMax = 0.5
moveBackVelocity = 0.2
angularVelocity = 0.3
