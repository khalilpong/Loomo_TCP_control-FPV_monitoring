[global]
ckptRange = 1.0

[checkpoints]
checkpoint = 1.0,0.0

[route1]
endCkpt = 1
mode = TcpPro

; body camera head pitch
headPitch = -0.25

; joystick speed limits
maxLinearVelocity = 0.80
maxReverseLinearVelocity = 0.45
maxAngularVelocity = 1.10

; acceleration / braking ramps
linearRampStep = 0.08
linearBrakeStep = 0.16
angularRampStep = 0.12
angularBrakeStep = 0.20

; reduce steering authority automatically at high speed
speedTurnCoupling = 0.30

; joystick shaping
joystickDeadband = 0.06
linearExpo = 1.25
angularExpo = 1.10

; sharp-turn handling for narrow paths
turnSlowdownGain = 0.65
lowSpeedTurnBoost = 0.30
sharpTurnThreshold = 0.72
sharpTurnLinearScale = 0.28

; when the stick is pulled mostly left/right, suppress tiny forward noise for pure pivot turns
pivotTurnAssistMinTurn = 0.45
pivotTurnAssistMaxForward = 0.18

; watchdog and status push
commandTimeoutMs = 1000
statusIntervalMs = 400

; video stream
videoPort = 6667
videoIntervalMs = 50
videoJpegQuality = 55
videoWidth = 480
videoHeight = 360

[voice]
startLinearVelocity = 0.3
linearVelocityStep = 0.1
linearVelocityMax = 0.5
moveBackVelocity = 0.2
angularVelocity = 0.3
