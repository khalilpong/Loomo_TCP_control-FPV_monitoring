[global]
; Track mode usually runs until manual stop.
; Keep one legal checkpoint so config parsing succeeds.
ckptRange = 1.0

[checkpoints]
checkpoint = 10.0,0.0

[route1]
endCkpt = 1
mode = ConeTrack

; YOLO is used only for person / vehicle safety stop.
cfgFilename = yolov3-tiny.cfg
weightsFilename = yolov3-tiny.weights
confidence = 0.35

; Main cone-track loop.
detectInterval = 120
headPitch = 0.0
cruiseLinearVelocity = 0.55
minLinearVelocity = 0.15
maxLinearVelocity = 0.70
maxAngularVelocity = 0.70

; Steering control.
centerGain = 1.10
headingGain = 1.30
centerDeadband = 0.03
headingDeadband = 0.03
curveSlowdownGain = 1.60

; Orange cone HSV range.
coneHueMin = 5
coneHueMax = 30
coneSatMin = 80
coneSatMax = 255
coneValMin = 80
coneValMax = 255
minConeArea = 180

; Lane estimation geometry.
nearRegionStart = 0.68
farRegionStart = 0.40
defaultTrackHalfWidthNear = 0.20
defaultTrackHalfWidthFar = 0.15
reuseLastTrackFrames = 4
lostTrackThreshold = 6
visibilityMinCones = 2
trackSmoothingAlpha = 0.60
trackConfidenceFloor = 0.45
linearRampStep = 0.08
angularRampStep = 0.14

; 0 means keep running until you press stop.
maxRunDistance = 0

; Safety obstacle classes.
obstacleClassIds = 0,1,2,3,5,7
obstacleConfidence = 0.35
obstacleDetectInterval = 250
obstacleCenterMargin = 0.22
obstacleMinWidth = 0.08
obstacleMinHeight = 0.10
obstacleResumeFrames = 3

[voice]
startLinearVelocity = 0.3
linearVelocityStep = 0.1
linearVelocityMax = 0.5
moveBackVelocity = 0.2
angularVelocity = 0.3
