[global]
; checkpoint 命中半径（米）
; VLS 主方案建议从 0.8~1.0 起步
ckptRange = 0.9

[checkpoints]
; 下面这组点是“反向跑、两个左转”的推荐模板
; 坐标必须按你当前 Loomo 的 VLS 地图坐标系重测
; 你可以理解为：
; C1 = 第一个左弯入口前
; C2 = 第一个左弯出口，进入停车区主通道
; C3 = 主通道前段
; C4 = 主通道中段
; C5 = 第二个左弯入口前
; C6 = 第二个左弯出口后靠近终点
checkpoint = 1.6,0.2
checkpoint = 3.4,1.7
checkpoint = 6.8,3.1
checkpoint = 14.5,3.1
checkpoint = 22.2,3.0
checkpoint = 24.0,4.5

[route1]
; 整段都由 VLS 导航，YOLO 只负责挡路停车/清空后恢复
endCkpt = 6
mode = VLS&YOLO

; ---------------------------------------------------------
; YOLO 模型：只用于前方障碍停车
; ---------------------------------------------------------
cfgFilename = yolov3-tiny.cfg
weightsFilename = yolov3-tiny.weights

; 障碍检测总置信度
confidence = 0.35

; 你当前用的是另一套车身摄像头，这里给中性值
headPitch = 0.70

; ---------------------------------------------------------
; 挡路目标类别（COCO）
; 0 person
; 1 bicycle
; 2 car
; 3 motorcycle
; 5 bus
; 7 truck
; 电瓶车一般会落到 1 或 3
; ---------------------------------------------------------
obstacleClassIds = 0,1,2,3,5,7

; 只有置信度超过这个值，才进入“挡路”判断
obstacleConfidence = 0.35

; 障碍检测周期（毫秒）
; 先不要太快，保证稳定
obstacleDetectInterval = 300

; 只有在画面中间带附近的目标，才算真正挡住主通道
; 越大越敏感，越容易停
obstacleCenterMargin = 0.22

; 只有目标足够大，才认为它真的离得近、会碰到
obstacleMinWidth = 0.09
obstacleMinHeight = 0.12

; 连续多少次确认“已经没有障碍”后，恢复 VLS 前进
obstacleResumeFrames = 4

[voice]
; 保留 voice section，避免 config load failed
startLinearVelocity = 0.3
linearVelocityStep = 0.1
linearVelocityMax = 0.5
moveBackVelocity = 0.2
angularVelocity = 0.3
