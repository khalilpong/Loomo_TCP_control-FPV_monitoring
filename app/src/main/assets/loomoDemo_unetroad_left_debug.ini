[global]
; checkpoint 主要用于流程闭环，不是 UNetRoad 的主控制依据
ckptRange = 1.0

[checkpoints]
; 这里只保留一个终点 checkpoint
; 坐标建议填整条路终点的大致 VLS/里程计参考位置
checkpoint = 30.0,0.0

[route1]
endCkpt = 1
mode = UNetRoad

; ---------------------------------------------------------
; YOLO：只做前方人/车/电瓶车的挡路停车
; ---------------------------------------------------------
cfgFilename = yolov3-tiny.cfg
weightsFilename = yolov3-tiny.weights
confidence = 0.35

; ---------------------------------------------------------
; UNet：主视觉来源
; 注意：如果你的模型只会把“整片柏油”都判成路，
; 那它更适合作为调试模式，不是最终主导航
; ---------------------------------------------------------
unetModelFilename = mobilenet_unet_road_seg.pb
unetModelWidth = 400
unetModelHeight = 240
unetRoadClassIdx = 7
unetRoadPixelMinCnt = 0.02

; 你当前用的是另一套车身摄像头，所以这里不靠抬头解决问题
headPitch = 0.0

; 主视觉处理周期（毫秒）
detectInterval = 180

; ---------------------------------------------------------
; 反向跑后的三段式路线：左转 -> 直行 -> 左转
; 以下都是第一版估值，必须现场微调
; ---------------------------------------------------------
arc1Distance = 3.2
straightDistance = 24.0
arc2Distance = 3.2
arc1TurnDirection = 1
arc2TurnDirection = 1

; ---------------------------------------------------------
; 速度参数：先保守，避免纯视觉时大幅摆动
; ---------------------------------------------------------
arcLinearVelocity = 0.18
straightLinearVelocity = 0.28
maxLinearVelocity = 0.32
maxAngularVelocity = 0.42

; ---------------------------------------------------------
; 视觉控制参数
; centerGain / headingGain 越大，修正越敏感
; centerDeadband / headingDeadband 用来压制整片柏油时的小抖动
; ---------------------------------------------------------
centerGain = 0.85
headingGain = 0.70
centerDeadband = 0.04
headingDeadband = 0.04

; 左弯阶段额外给一点轻微左转偏置
arcTurnBias = 0.08

; 连续丢路多少帧后彻底停车
lostFrameThreshold = 8

; ---------------------------------------------------------
; 短时丢路保护
; 避免“一丢视觉就原地慢慢转”
; ---------------------------------------------------------
reuseLastRoadFrames = 4
lostRoadLinearVelocity = 0.05
lostRoadAngularScale = 0.35
roadSmoothingAlpha = 0.65
wideRoadThreshold = 0.62
wideRoadAngularScale = 0.50
wideRoadLinearScale = 0.75

; ---------------------------------------------------------
; 入口搜路起步
; 当入口一开始整片柏油导致 UNet 给不出稳定结果时，
; 允许它低速按当前阶段方向“试探性起步”一小段
; 一旦看到稳定路面结果，再切回正常视觉闭环
; ---------------------------------------------------------
bootstrapSearchEnabled = true
bootstrapLinearVelocity = 0.12
bootstrapAngularVelocity = 0.16
bootstrapMaxDistance = 1.20

; ---------------------------------------------------------
; 前方障碍检测
; 电瓶车通常会被识别成 bicycle / motorcycle
; ---------------------------------------------------------
obstacleClassIds = 0,1,2,3,5,7
obstacleConfidence = 0.35
obstacleDetectInterval = 300
obstacleCenterMargin = 0.20
obstacleMinWidth = 0.10
obstacleMinHeight = 0.12
obstacleResumeFrames = 4

; ---------------------------------------------------------
; 优先用视觉判断何时出第一个左弯、何时进第二个左弯
; 距离参数只作为兜底
; ---------------------------------------------------------
useTurnDetection = false
arc1CompleteThreshold = 0.08
arc1CompleteFrames = 4
turnDetectThreshold = 0.09
turnDetectFrames = 5
arc2CompleteThreshold = 0.08
arc2CompleteFrames = 4
arc1MinDistance = 1.8
straightMinDistance = 8.0

[voice]
startLinearVelocity = 0.3
linearVelocityStep = 0.1
linearVelocityMax = 0.5
moveBackVelocity = 0.2
angularVelocity = 0.3
