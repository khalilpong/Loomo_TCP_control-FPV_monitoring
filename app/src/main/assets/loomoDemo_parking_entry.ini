; ============================================================
;  Loomo 停车场入场路线配置
;  路径: 入口 → 右侧非标准1/4圆弧 → 停车区直线 → 对称1/4圆弧 → 出口
;  此文件部署时需复制到设备 /sdcard/loomoDemo.ini
;
;  【视觉方案】useTurnDetection = true（推荐，无需测量直道长度）
;  【手动方案】useTurnDetection = false（需填写实测距离）
; ============================================================

[global]
; 到达终点检查点的判定距离阈值 (米)
; 视觉方案下终点由弧完成检测决定，此值仅作最终安全兜底
ckptRange = 2.0

[checkpoints]
; 视觉方案下设置一个远端检查点作为最终安全兜底
; 里程计超过此距离时强制结束（应大于实际路程，设 200m 保守值）
checkpoint = 200.0,0.0

; ============================================================
; 路线1: UNetRoad 模式
;   视觉居中 + 视觉转弯检测 + YOLO 障碍检测
; ============================================================
[route1]
endCkpt = 1
mode = UNetRoad

; ------ YOLO 障碍检测模型 ------
cfgFilename     = yolov3-tiny.cfg
weightsFilename = yolov3-tiny.weights
confidence      = 0.32

; ------ UNet 道路分割模型 ------
unetModelFilename   = mobilenet_unet_road_seg.pb
unetModelWidth      = 400
unetModelHeight     = 240
unetRoadClassIdx    = 7
unetRoadPixelMinCnt = 0.04

; 摄像头俯仰角（弧度，0.72 ≈ 41°低头，看清近处路面）
headPitch      = 0.72
detectInterval = 220

; ============================================================
; 【视觉转弯检测开关】
;   true  → 全自动，无需测量直道长度（推荐）
;   false → 退回纯里程计模式（需设置准确的 arc/straightDistance）
; ============================================================
useTurnDetection = true

; ============================================================
; 路径分段里程（视觉方案中作为安全兜底，不需要精确值）
;
; arc1Distance:
;   - 视觉模式: 最小有效距离 × 2.0 才触发视觉切换（防误触）
;   - 手动模式: 实际入弧行驶距离
;   参考: 弧半径≈4m 四分之一圆弧长≈6.3m；非标准弧约 7m
;
; straightDistance:
;   - 视觉模式: 兜底值，设大（999）以完全依赖视觉检测
;   - 手动模式: 实际停车区直线距离（需现场测量）
;
; arc2Distance:
;   - 视觉模式: 出口弧距离兜底（与入弧近似即可）
;   - 手动模式: 实际出弧行驶距离
; ============================================================
arc1Distance     = 8.0
straightDistance = 999.0
arc2Distance     = 8.0

; 转向方向: -1=右转, 1=左转
arc1TurnDirection = -1
arc2TurnDirection = -1

; ============================================================
; 视觉转弯检测参数（useTurnDetection=true 时生效）
;
; arc1CompleteThreshold:
;   ARC_1→STRAIGHT 触发条件：|farCenter.x - nearCenter.x| < 此值
;   表示远近道路中心对齐（前方路面变直）
;   ★ 如果直道起点提前切换，增大此值；切换太晚则减小
;   典型范围: 0.05~0.10
;
; arc1CompleteFrames:
;   连续满足条件的帧数，防止单帧噪声误触发
;   ★ 如果误触发频繁，增大此值
;
; arc1MinDistance:
;   ARC_1 阶段视觉检测的最小生效距离（米）
;   在此距离内强制保持 ARC_1，防止启动时视觉抖动
;
; turnDetectThreshold:
;   STRAIGHT→ARC_2 触发条件：带符号偏差 > 此值
;   偏差 = farCenter.x - nearCenter.x（右转时>0）
;   ★ 如果提前检测到弯（路边树木干扰），增大此值
;   ★ 如果检测太晚（到弯口才触发），减小此值
;   典型范围: 0.08~0.18
;
; turnDetectFrames:
;   连续检测到转弯信号的帧数
;   ★ 停车场有侧方停车干扰时，增大此值（6~8）
;
; straightMinDistance:
;   进入直道后视觉转弯检测的最小生效距离（米）
;   防止刚完成 arc1 时的过渡偏差误触发 arc2
;
; arc2CompleteThreshold / arc2CompleteFrames:
;   ARC_2→ARRIVED：偏差归零判定参数（同 arc1 对应参数）
; ============================================================
arc1CompleteThreshold = 0.07
arc1CompleteFrames    = 4
arc1MinDistance       = 2.0

turnDetectThreshold   = 0.11
turnDetectFrames      = 5
straightMinDistance   = 6.0

arc2CompleteThreshold = 0.07
arc2CompleteFrames    = 4

; ============================================================
; 速度参数
;   弧线段慢速保稳定，直线段适当提速
; ============================================================
arcLinearVelocity      = 0.22
straightLinearVelocity = 0.36
maxLinearVelocity      = 0.42
maxAngularVelocity     = 0.68

; ============================================================
; 视觉居中控制增益
;   centerGain:  近处道路中心偏差修正力度
;   headingGain: 远处道路方向偏差修正力度
;   arcTurnBias: 弧线段额外转向偏置（叠加到基础转向）
;     ★ 右弧转弯不足 → 增大；转弯过度 → 减小
;   lostFrameThreshold: 连续失去路面后紧急停车的帧数
; ============================================================
centerGain         = 1.30
headingGain        = 1.05
arcTurnBias        = 0.28
lostFrameThreshold = 6

; ============================================================
; 障碍检测参数（行人、车辆进出停车场）
;
; obstacleClassIds COCO 类别:
;   0=行人  1=自行车  2=轿车  3=摩托车  5=公共汽车  7=卡车
;
; obstacleCenterMargin:
;   障碍物中心水平偏移容忍度（归一化 0~1）
;   路边停车时中心偏移较大，不应触发停车
;   ★ 路边停车误报多 → 减小；漏检前方障碍 → 增大
;
; obstacleMinWidth/Height:
;   障碍物最小尺寸（归一化），过小视为远处无威胁
;
; obstacleResumeFrames:
;   障碍消失后连续确认帧数，停车场内车辆穿行时防频繁启停
;   ★ 车辆穿行时频繁启停 → 增大（6~10）
; ============================================================
obstacleClassIds       = 0,1,2,3,5,7
obstacleConfidence     = 0.30
obstacleDetectInterval = 250
obstacleCenterMargin   = 0.25
obstacleMinWidth       = 0.08
obstacleMinHeight      = 0.10
obstacleResumeFrames   = 6

; ============================================================
; 语音控制参数（手动干预）
;   GO AHEAD / SPEED UP / SLOW DOWN / MOVE BACK
;   TURN LEFT / TURN RIGHT / NEXT ROUTE / BYE BYE
; ============================================================
[voice]
startLinearVelocity = 0.3
linearVelocityStep  = 0.1
linearVelocityMax   = 0.5
moveBackVelocity    = 0.2
angularVelocity     = 0.3
